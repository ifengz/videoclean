name: Build Windows Directory Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: py -3 -m pip install pyinstaller

      - name: Build Windows directory release
        run: .\build_windows.bat

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          $shortSha = "${env:GITHUB_SHA}".Substring(0, 7)
          "tag_name=build-$shortSha" >> $env:GITHUB_OUTPUT
          "release_name=VideoCleaner build $shortSha" >> $env:GITHUB_OUTPUT

      - name: Archive build output
        shell: pwsh
        run: |
          Compress-Archive -Path dist/VideoCleaner/* -DestinationPath dist/VideoCleaner-windows-directory.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoCleaner-windows-directory
          path: dist/VideoCleaner
          if-no-files-found: error

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body: |
            自动构建的 Windows 目录版。

            提交：${{ github.sha }}
          draft: false
          prerelease: false
          files: dist/VideoCleaner-windows-directory.zip
